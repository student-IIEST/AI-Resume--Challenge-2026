# ============================================================================
# Approach summary
# ============================================================================

methodology_summary: |
  This project implements a rule-based AI candidate ranking system for the
  Redrob Intelligent Candidate Discovery Challenge.

  Each candidate is evaluated using multiple scoring factors including:
  - Years of experience
  - Current job title
  - AI/ML related technical skills
  - Career history keyword matching
  - Current company preference
  - Open-to-work status
  - Notice period

  After calculating scores for all candidates, the system ranks every
  candidate, selects the Top 100 candidates, and automatically generates
  the required submission.csv file.

